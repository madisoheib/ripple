services:
  ripple:
    image: ripple:qa
    ports:
      - "8080:8080"

  app:
    build:
      context: ../..
      dockerfile: qa/laravel/Dockerfile
    depends_on:
      - ripple
    environment:
      # Docker env wins over .env (Dotenv doesn't override real env vars).
      BROADCAST_CONNECTION: ripple
      RIPPLE_HOST: ripple
      RIPPLE_PORT: "8080"
      RIPPLE_SCHEME: http
      RIPPLE_APP_ID: app1
      RIPPLE_KEY: ripple-key
      RIPPLE_SECRET: ripple-secret
